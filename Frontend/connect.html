<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Sync</title>
</head>
<body>
    <h1>รายการจองห้องประชุม</h1>
    <div id="display">กำลังโหลดข้อมูล...</div>

    <script>
        fetch('http://localhost:3000/api/bookings')
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then((responseData) => {
            console.log('response:', responseData);
            
           const displayDiv = document.getElementById('display');
            if (responseData.length === 0) {
                displayDiv.innerHTML = 'ไม่มีรายการจอง';
            } else {
                displayDiv.innerHTML = responseData.map(item => 
                    `<p>${item.start} - ${item.end}: ${item.title}</p>`
                ).join('');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('display').innerHTML = 'เชื่อมต่อข้อมูลไม่ได้';
        });
    </script>
</body>
</html>
